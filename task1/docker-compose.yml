services:
  branch_a:
    build:
      context: .
      args:
        NODE: a
    container_name: branch_a
    hostname: branch-a
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      NODE_ID: a
    networks:
      ops_net:
        ipv4_address: 172.31.0.11
      link_primary:
        ipv4_address: 10.50.0.11
      link_backup:
        ipv4_address: 10.60.0.11

  branch_b:
    build:
      context: .
      args:
        NODE: b
    container_name: branch_b
    hostname: branch-b
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      NODE_ID: b
    networks:
      ops_net:
        ipv4_address: 172.31.0.22
      link_primary:
        ipv4_address: 10.50.0.22
      link_backup:
        ipv4_address: 10.60.0.22

networks:
  ops_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24
  link_primary:
    driver: bridge
    ipam:
      config:
        - subnet: 10.50.0.0/24
  link_backup:
    driver: bridge
    ipam:
      config:
        - subnet: 10.60.0.0/24
