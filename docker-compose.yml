services:
  office_msk:
    build:
      context: .
      args:
        SITE: msk
    container_name: office_msk
    hostname: office-msk
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      SITE_ID: msk
      OVERLAY_ENABLED: "1"
    networks:
      mgmt_net:
        ipv4_address: 172.30.0.10
      wan_fiber:
        ipv4_address: 10.10.0.10
      wan_sat:
        ipv4_address: 10.20.0.10

  office_spb:
    build:
      context: .
      args:
        SITE: spb
    container_name: office_spb
    hostname: office-spb
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      SITE_ID: spb
      OVERLAY_ENABLED: "1"
    networks:
      mgmt_net:
        ipv4_address: 172.30.0.20
      wan_fiber:
        ipv4_address: 10.10.0.20
      wan_sat:
        ipv4_address: 10.20.0.20

networks:
  mgmt_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  wan_fiber:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
  wan_sat:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/24
